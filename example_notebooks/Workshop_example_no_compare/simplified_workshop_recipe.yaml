# AA-SI Workshop Pipeline Recipe Configuration

# Data retrieval: NCEI query and download parameters
data_retrieval:
  # ISO 8601 format: "YYYY-MM-DDTHH:MM:SS" (all components after the date are optional)
  # Valid examples: "2016-07-25", "2016-07-25T21", "2016-07-25T21:44", "2016-07-25T21:44:25"
  file_time_start: "2016-07-25T20:58"
  # file_time_start: "2016-07-25T22"

  # Note: a date-only value (e.g. "2016-07-25") resolves to midnight (00:00:00), not end-of-day.
  # To include all files on that day, use "2016-07-25T23:59" or add an explicit time.
  file_time_end: "2016-07-25T21:45"
  # file_time_end: "2016-07-25T24"


  filters:
    CRUISE_NAME: "HB1603"
  companion_extensions:
    - ".bot"
    - ".idx"

# Local environment: directories, filenames, and initial setup
local_environment:
  initial_setup:
    raw_input_folder: "../raw_files/workshop_example"
    cal_input_folder: "../calibration_files/HB201607_cal"
    output_base: "./nefsc_uc_e2_cal_outputs"
    netcdf_output_folder: "./NetCDF-files"
    sv_output_folder: "./Sv-files"
    output_logs_folder: "./Output-Logs"
    raw_file_names: []  # Only populate if you don't want to include all raw files in the folder
    clear_previous_json_logs: true

  open_and_combine_raw_files:
    sonar_model: "EK60"
    include_bot: true

# Calibration: standardized calibration pipeline parameters
calibration:
  calibration_pipeline:
    record_author: "<Your Name>"     # Replace with your name
    cruise_id: "HB1603"               # Must match the cruise being processed
    short_filenames: true
    keep_unused_standardized_files: true
    conflict_resolution: "error"  # "interactive" or "error"

# Masking: seafloor, surface, and frequency exclusions
masking:
  remove_seafloor_from_mask:
    seafloor_buffer_m: 100
    use_best_detection: true
    min_valid_depth_m: 10.0
  remove_surface_from_mask:
    surface_depth_m: 10.0
  mask_frequency_channels:
    frequencies_to_mask: [70, 120, 200]

# Noise removal
noise_removal:
  remove_noise:
    noise_range_sample_num: 10
    noise_ping_num: 5

# MVBS
mvbs:
  mask_sparse_bins:
    range_bin: "2m"
    ping_time_bin: "10s"
    nan_threshold: 0.6
  compute_MVBS:
    range_bin: "2m"
    ping_time_bin: "10s"

# Line files and overlay styles
line_files:
  line_name: "sw_dive_profile"
  line_file_path: "../line_files/SpermWhaleClicks_click_data_HB1603_SpermWhaleDive_Span0.2_07252016_2120_UTC.csv"
  overlay_lines:
    - var_suffix: "_fit"
      style:
        color: "red"
        linewidth: 3.5

# Echogram visualization parameters
echogram_visualization:
  plot_sv_echogram:
    min_depth: 0
    max_depth: 1800
    ping_min: 0
    ping_max: 515
    x_axis_units: "seconds"
    y_axis_units: "meters"

# Machine learning parameters
ml:
  cluster_colors:
    - "#F700FF"
    - "#35E200"
    - "#5EFC9B"
    - "#2F00FF"
    - "#E60000"
    - "#FFFB1C"
    - "#000F92"
    - "#E70000"
    - "#00948D"
    - "#5BECFFFF"
    - "#4100B9FF"


  reshape_data_for_ml:
    data_var: "Sv"
    dataset_name: "ml_dataset"
    feature_strategy: "mean_centered"
    baseline_channel: 0

  normalize_data:
    method: "flatten"
    shift_positive: false
    normalization_name: "normalized_flatten_mean_centered"
    feature_weights: [1, 1, 1]

  hdbscan:
    ml_result_name: "hdbscan_results"
    plot_window: [0, 1800, 0, 515]
    min_samples: 4
    sample_size: 1000000
    min_cluster_size: 1400
    cluster_selection_method: "eom"
    use_hdbscan: true